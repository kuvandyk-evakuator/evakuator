<script>
  (function() {
    // ===== НАСТРОЙКИ =====
    const MY_PHONE = '+79010993555';
    const CHAT_ID = '5992703537';
    const DADATA_KEY = 'bda7f0f98760ba924daaf3841287ce4ea0ac1aea';

    const addressFrom = document.getElementById('addressFrom');
    const addressTo = document.getElementById('addressTo');
    const fromSuggestions = document.getElementById('fromSuggestions');
    const toSuggestions = document.getElementById('toSuggestions');
    const distanceDisplay = document.getElementById('distanceDisplay');
    const distanceValue = document.getElementById('distanceValue');
    const distanceLoading = document.getElementById('distanceLoading');
    const blockedWheelsBlock = document.getElementById('blockedWheelsBlock');
    const blockedWheelsCount = document.getElementById('blockedWheelsCount');
    const neutralBlock = document.getElementById('neutralBlock');
    const customTimeBlock = document.getElementById('customTimeBlock');
    const timerBlock = document.getElementById('timerBlock');
    const timerCount = document.getElementById('timerCount');
    const timerStatus = document.getElementById('timerStatus');
    const finalPriceBlock = document.getElementById('finalPriceBlock');
    const calcPriceBtn = document.getElementById('calcPriceBtn');
    const formContainer = document.getElementById('formContainer');

    let currentDistance = 0;
    let distanceCalculated = false;
    let orderId = null;

    function initButtonGroup(groupId, onChangeCallback) {
      const group = document.getElementById(groupId);
      if (!group) return;
      group.addEventListener('click', (e) => {
        const btn = e.target.closest('.btn-option');
        if (!btn) return;
        group.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (onChangeCallback) onChangeCallback(btn.dataset.value);
      });
    }

    function getSelectedValue(groupId) {
      const active = document.querySelector(`#${groupId} .btn-option.active`);
      return active ? active.dataset.value : null;
    }

    initButtonGroup('situationGroup');
    initButtonGroup('transportTypeGroup');
    initButtonGroup('vehicleTypeGroup');
    initButtonGroup('positionGroup');
    initButtonGroup('damageGroup');
    initButtonGroup('towHookGroup');
    initButtonGroup('wheelsRollGroup', (v) => v === 'Нет' ? blockedWheelsBlock.classList.remove('hidden') : blockedWheelsBlock.classList.add('hidden'));
    initButtonGroup('gearboxGroup', (v) => v !== 'Механика' ? neutralBlock.classList.remove('hidden') : neutralBlock.classList.add('hidden'));
    initButtonGroup('neutralGroup');
    initButtonGroup('timeGroup', (v) => v === 'Ко времени' ? customTimeBlock.classList.remove('hidden') : customTimeBlock.classList.add('hidden'));

    document.getElementById('customerPhone').addEventListener('input', (e) => {
      let val = e.target.value.replace(/\D/g, '');
      if (!val.startsWith('7')) val = '7' + val;
      val = val.substring(0, 11);
      let f = '+7';
      if (val.length > 1) f += ' (' + val.substring(1, 4);
      if (val.length >= 4) f += ') ' + val.substring(4, 7);
      if (val.length >= 7) f += '-' + val.substring(7, 9);
      if (val.length >= 9) f += '-' + val.substring(9, 11);
      e.target.value = f;
    });

    document.getElementById('vehicleTypeGroup').addEventListener('click', (e) => {
      const btn = e.target.closest('.btn-option');
      if (!btn) return;
      if (btn.dataset.value === 'Трактор' || btn.dataset.value === 'Легкий коммерческий') {
        setTimeout(() => alert('✅ Отлично! Мой эвакуатор справится с этим весом. Конкуренты с малым тоннажем не смогут вам помочь.'), 100);
      }
    });

    // ===== ПОДСКАЗКИ АДРЕСОВ =====
    async function fetchSuggestions(query, suggestionsList) {
      if (query.length < 3) { suggestionsList.classList.add('hidden'); return; }
      try {
        const res = await fetch('https://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/address', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Token ' + DADATA_KEY },
          body: JSON.stringify({ query: query, count: 5 })
        });
        const data = await res.json();
        suggestionsList.innerHTML = '';
        if (data.suggestions && data.suggestions.length > 0) {
          data.suggestions.forEach(s => {
            const li = document.createElement('li');
            li.textContent = s.value;
            li.addEventListener('click', () => {
              const input = suggestionsList.id === 'fromSuggestions' ? addressFrom : addressTo;
              input.value = s.value;
              input.dataset.lat = s.data.geo_lat;
              input.dataset.lon = s.data.geo_lon;
              suggestionsList.classList.add('hidden');
              distanceCalculated = false;
              updateCalcButton();
            });
            suggestionsList.appendChild(li);
          });
          suggestionsList.classList.remove('hidden');
        } else {
          suggestionsList.classList.add('hidden');
        }
      } catch (e) {}
    }

    let fromTimeout, toTimeout;
    addressFrom.addEventListener('input', () => { clearTimeout(fromTimeout); fromTimeout = setTimeout(() => fetchSuggestions(addressFrom.value.trim(), fromSuggestions), 300); });
    addressTo.addEventListener('input', () => { clearTimeout(toTimeout); toTimeout = setTimeout(() => fetchSuggestions(addressTo.value.trim(), toSuggestions), 300); });

    document.addEventListener('click', (e) => {
      if (!document.getElementById('fromSection').contains(e.target)) fromSuggestions.classList.add('hidden');
      if (!document.getElementById('toSection').contains(e.target)) toSuggestions.classList.add('hidden');
    });

    function updateCalcButton() {
      if (distanceCalculated) {
        calcPriceBtn.disabled = false;
        calcPriceBtn.textContent = '🔍 Узнать цену';
      } else {
        calcPriceBtn.disabled = true;
        calcPriceBtn.textContent = '🔍 Сначала рассчитайте расстояние';
      }
    }
    updateCalcButton();

    // ===== РАСЧЁТ РАССТОЯНИЯ =====
    document.getElementById('calcDistanceBtn').addEventListener('click', async () => {
      const lat1 = parseFloat(addressFrom.dataset.lat);
      const lon1 = parseFloat(addressFrom.dataset.lon);
      const lat2 = parseFloat(addressTo.dataset.lat);
      const lon2 = parseFloat(addressTo.dataset.lon);

      if (!addressFrom.value.trim() || !addressTo.value.trim()) { alert('Заполните оба адреса'); return; }
      if (!lat1 || !lon1 || !lat2 || !lon2) { alert('Выберите адрес из выпадающего списка'); return; }

      distanceDisplay.classList.add('hidden');
      distanceLoading.classList.remove('hidden');
      distanceCalculated = false;
      updateCalcButton();

      try {
        const url = `https://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}?overview=false`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
          currentDistance = Math.round(data.routes[0].distance / 1000);
          distanceValue.textContent = currentDistance;
          distanceDisplay.classList.remove('hidden');
          distanceCalculated = true;
          updateCalcButton();
        } else {
          throw new Error('Маршрут не найден');
        }
      } catch (e) {
        alert('Не удалось рассчитать расстояние. Введите километры вручную.');
        const existing = document.getElementById('manualKmBlock');
        if (!existing) {
          const manualInput = document.createElement('div');
          manualInput.className = 'section';
          manualInput.id = 'manualKmBlock';
          manualInput.innerHTML = '<div class="label">⚠️ Введите расстояние вручную (км)</div><input type="number" id="manualKm" placeholder="15" min="0" step="0.1">';
          document.getElementById('calcDistanceBtn').after(manualInput);
          document.getElementById('manualKm').addEventListener('input', function() {
            currentDistance = parseFloat(this.value) || 0;
            distanceValue.textContent = currentDistance;
            distanceDisplay.classList.remove('hidden');
            distanceCalculated = true;
            updateCalcButton();
          });
        }
      }
      distanceLoading.classList.add('hidden');
    });

    // ===== ФОРМУЛА ЦЕНЫ =====
    function calculatePrice() {
      const vehicleType = getSelectedValue('vehicleTypeGroup');
      const position = getSelectedValue('positionGroup');
      const towHook = getSelectedValue('towHookGroup');
      const wheelsRoll = getSelectedValue('wheelsRollGroup');
      const gearbox = getSelectedValue('gearboxGroup');
      const neutral = getSelectedValue('neutralGroup');
      const transportType = getSelectedValue('transportTypeGroup');
      const distance = currentDistance;

      let basePrice = 0, kmRate = 0;
      switch (vehicleType) {
        case 'Легковой': case 'Кроссовер': basePrice = 2500; kmRate = 100; break;
        case 'Внедорожник': basePrice = 2800; kmRate = 100; break;
        case 'Легкий коммерческий': basePrice = 3000; kmRate = 120; break;
        case 'Трактор': basePrice = 3500; kmRate = 150; break;
        default: basePrice = 2500; kmRate = 100;
      }

      let distanceCost = (transportType === 'По городу' || distance < 10) ? 0 : kmRate * distance;
      let totalPrice = basePrice + distanceCost;
      let extras = [], extraCost = 0;

      if (towHook === 'Нет ничего') { extraCost += 300; extras.push('Нет буксировочного: +300₽'); }
      if (wheelsRoll === 'Нет') { extraCost += 500; extras.push('Заблокировано колёс: +500₽'); }
      if (gearbox !== 'Механика' && neutral === 'Нет') { extraCost += 500; extras.push('Не встаёт на нейтраль: +500₽'); }
      if (position === 'В кювете') { extraCost += 2000; extras.push('В кювете: +2000₽'); }
      else if (position === 'На боку' || position === 'На крыше') { extraCost += 3500; extras.push('На боку/крыше: +3500₽'); }

      totalPrice += extraCost;
      return { basePrice, distanceCost, extraCost, extras, totalPrice, distance };
    }

    function collectFormData() {
      return {
        name: document.getElementById('customerName').value.trim(),
        phone: document.getElementById('customerPhone').value.trim(),
        situation: getSelectedValue('situationGroup'),
        transportType: getSelectedValue('transportTypeGroup'),
        vehicleType: getSelectedValue('vehicleTypeGroup'),
        position: getSelectedValue('positionGroup'),
        damage: getSelectedValue('damageGroup'),
        wheelsRoll: getSelectedValue('wheelsRollGroup'),
        blockedWheels: getSelectedValue('wheelsRollGroup') === 'Нет' ? blockedWheelsCount.value : 'Нет',
        gearbox: getSelectedValue('gearboxGroup'),
        neutral: getSelectedValue('gearboxGroup') !== 'Механика' ? getSelectedValue('neutralGroup') : '—',
        towHook: getSelectedValue('towHookGroup'),
        time: getSelectedValue('timeGroup'),
        customTime: getSelectedValue('timeGroup') === 'Ко времени' ? document.getElementById('customTimeInput').value : '—',
        addressFrom: addressFrom.value.trim(),
        addressTo: addressTo.value.trim(),
        distance: currentDistance
      };
    }

    // ===== КНОПКА "УЗНАТЬ ЦЕНУ" =====
    calcPriceBtn.addEventListener('click', () => {
      if (!distanceCalculated) { alert('Сначала рассчитайте расстояние!'); return; }

      const formData = collectFormData();
      const priceData = calculatePrice();

      if (!formData.name || !formData.phone || !formData.situation || !formData.transportType || 
          !formData.vehicleType || !formData.position || !formData.damage || !formData.wheelsRoll ||
          !formData.gearbox || !formData.towHook || !formData.time || !formData.addressFrom || !formData.addressTo) {
        alert('Пожалуйста, заполните все поля формы');
        return;
      }
      if (formData.phone.replace(/\D/g, '').length < 11) { alert('Введите корректный номер телефона'); return; }

      orderId = 'ORD-' + Date.now().toString(36).toUpperCase();
      formContainer.style.display = 'none';
      timerBlock.classList.remove('hidden');
      let seconds = 60;
      timerCount.textContent = seconds;
      timerStatus.textContent = 'секунд. Ожидайте ответ...';

      const timerInterval = setInterval(() => {
        seconds--;
        timerCount.textContent = seconds;
        if (seconds <= 0) { clearInterval(timerInterval); timerStatus.textContent = 'секунд. Ожидайте подтверждение...'; }
      }, 1000);

      sendToTelegram(formData, priceData, timerInterval);
    });

    // ===== ОТПРАВКА В TELEGRAM (через Netlify Function) =====
    async function sendToTelegram(formData, priceData, timerInterval) {
      const message = `🚛 *НОВЫЙ ЗАКАЗ #${orderId}*\n\n👤 *Клиент:* ${formData.name}\n📞 *Телефон:* ${formData.phone}\n🚨 *Ситуация:* ${formData.situation}\n📍 *Перевозка:* ${formData.transportType}\n🚗 *Тип ТС:* ${formData.vehicleType}\n🚙 *Положение:* ${formData.position}\n🔧 *Неисправность:* ${formData.damage}\n🛞 *Колёса крутятся:* ${formData.wheelsRoll}\n🔒 *Заблокировано колёс:* ${formData.blockedWheels}\n⚙️ *КПП:* ${formData.gearbox}\n⚡ *Нейтраль:* ${formData.neutral}\n🪝 *Буксировка:* ${formData.towHook}\n⏱️ *Время подачи:* ${formData.time} ${formData.customTime !== '—' ? formData.customTime : ''}\n📍 *Откуда:* ${formData.addressFrom}\n📌 *Куда:* ${formData.addressTo}\n🗺️ *Расстояние:* ${formData.distance} км\n\n💰 *РАСЧЁТ СТОИМОСТИ:*\nБазовая ставка: ${priceData.basePrice}₽\nКилометраж: ${priceData.distanceCost}₽\nДоплаты: ${priceData.extraCost}₽\n${priceData.extras.join('\n')}\n\n💎 *ИТОГО: ${priceData.totalPrice}₽*`;

      const inlineKeyboard = {
        inline_keyboard: [
          [{ text: '✅ Подтвердить заказ', callback_data: `confirm_${orderId}` }, { text: '💸 Изменить сумму', callback_data: `editprice_${orderId}` }],
          [{ text: '❌ Отменить заказ', callback_data: `cancel_${orderId}` }]
        ]
      };

      try {
        const response = await fetch('/api/send-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: message, parse_mode: 'Markdown', reply_markup: inlineKeyboard })
        });
        const data = await response.json();
        if (data.ok) {
          startPolling(data.result.message_id, priceData, timerInterval);
        } else {
          alert('Ошибка: ' + data.description);
          showFinalPrice(priceData, timerInterval);
        }
      } catch (err) {
        alert('Ошибка соединения.');
        showFinalPrice(priceData, timerInterval);
      }
    }

    // ===== ОПРОС ПОДТВЕРЖДЕНИЯ (через Netlify Function) =====
    function startPolling(messageId, priceData, timerInterval) {
      let attempts = 0;
      const pollInterval = setInterval(async () => {
        attempts++;
        try {
          const res = await fetch('/api/check-order');
          const data = await res.json();
          if (data.ok && data.result && data.result.length > 0) {
            const lastUpdate = data.result[data.result.length - 1];
            if (lastUpdate.callback_query && lastUpdate.callback_query.message.message_id === messageId) {
              const cb = lastUpdate.callback_query;
              if (cb.data.startsWith('confirm_')) {
                clearInterval(pollInterval);
                showFinalPrice(priceData, timerInterval);
                answerCallback(cb.id, '✅ Заказ подтверждён!');
                sendTgMsg('✅ *Заказ #' + orderId + ' подтверждён!* Цена: ' + priceData.totalPrice + '₽');
              } else if (cb.data.startsWith('editprice_')) {
                answerCallback(cb.id, 'Введите новую цену в чат (только число). Например: 5000');
                waitForPrice(messageId, priceData, timerInterval, pollInterval);
              } else if (cb.data.startsWith('cancel_')) {
                clearInterval(pollInterval);
                clearInterval(timerInterval);
                timerBlock.classList.add('hidden');
                formContainer.style.display = 'block';
                answerCallback(cb.id, '❌ Заказ отменён');
                sendTgMsg('❌ *Заказ #' + orderId + ' отменён владельцем.*');
              }
            }
          }
        } catch (e) {}
        if (attempts >= 80) {
          clearInterval(pollInterval);
          showFinalPrice(priceData, timerInterval);
        }
      }, 3000);
    }

    function waitForPrice(messageId, priceData, timerInterval, pollInterval) {
      let waitAttempts = 0;
      const waitInterval = setInterval(async () => {
        waitAttempts++;
        try {
          const res = await fetch('/api/check-order');
          const data = await res.json();
          if (data.ok && data.result && data.result.length > 0) {
            const lastUpdate = data.result[data.result.length - 1];
            if (lastUpdate.message && lastUpdate.message.text && lastUpdate.message.chat.id.toString() === CHAT_ID) {
              const newPrice = parseInt(lastUpdate.message.text.trim());
              if (!isNaN(newPrice) && newPrice > 0) {
                clearInterval(waitInterval);
                clearInterval(pollInterval);
                showFinalPrice({ ...priceData, totalPrice: newPrice }, timerInterval);
                sendTgMsg('✅ *Цена изменена!* Новая сумма: ' + newPrice + '₽');
              }
            }
          }
        } catch (e) {}
        if (waitAttempts >= 30) {
          clearInterval(waitInterval);
          showFinalPrice(priceData, timerInterval);
          sendTgMsg('⏰ Время вышло. Клиент видит исходную цену: ' + priceData.totalPrice + '₽');
        }
      }, 3000);
    }

    function answerCallback(id, text) {
      fetch('/api/answer-callback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ callback_query_id: id, text: text })
      });
    }

    function sendTgMsg(text) {
      fetch('/api/send-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, parse_mode: 'Markdown' })
      });
    }

    function showFinalPrice(priceData, timerInterval) {
      if (timerInterval) clearInterval(timerInterval);
      timerBlock.classList.add('hidden');
      finalPriceBlock.innerHTML = `
        <div class="price-block">
          <div style="font-size:1rem; color:#BCCCDC;">Стоимость эвакуации</div>
          <div class="price-amount">${priceData.totalPrice} ₽</div>
          <div class="price-breakdown">
            База: ${priceData.basePrice}₽<br>
            Километраж: ${priceData.distanceCost}₽<br>
            Доплаты: ${priceData.extraCost}₽
            ${priceData.extras.length ? '<br>' + priceData.extras.join('<br>') : ''}
          </div>
        </div>
        <button class="btn-success" onclick="window.location.href='tel:${MY_PHONE}'">✅ Устраивает! Позвонить водителю</button>
        <button class="btn-danger" id="clientCancelBtn">❌ Отказаться от заказа</button>
      `;
      finalPriceBlock.classList.remove('hidden');

      document.getElementById('clientCancelBtn').addEventListener('click', async () => {
        await sendTgMsg('❌ *Клиент отказался от заказа #' + orderId + '*\nЗаказ отменён клиентом после показа цены.');
        alert('Заказ отменён. Спасибо за обращение!');
        location.reload();
      });
    }
  })();
</script>
